<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="/pdfjs/pdf_viewer.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: sans-serif; }
  .container { display: flex; flex-direction: column; height: 100%; }
  .toolbar {
    display: flex; gap: 6px; padding: 4px 8px;
    background: #323639; color: #fff; align-items: center;
    flex-wrap: wrap;
  }
  .toolbar button {
    padding: 3px 10px; font-size: 12px; cursor: pointer;
    background: #565a5c; color: #fff; border: 1px solid #666; border-radius: 3px;
  }
  .toolbar button:hover { background: #777; }
  .toolbar button:disabled { opacity: 0.4; cursor: default; }
  .toolbar input[type="number"] { width: 50px; text-align: center; padding: 2px; }
  .toolbar select { padding: 2px; }
  .toolbar label { font-size: 12px; }
  .toolbar .spacer { flex: 1; }
  .toolbar .filename { font-size: 13px; color: #ff8; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .main-area { display: flex; flex: 1; overflow: hidden; }
  .sidebar {
    width: 200px; border-right: 1px solid #ddd; overflow-y: auto;
    padding: 8px; background: #f5f5f5; font-size: 13px;
  }
  .sidebar h4 { margin: 4px 0 6px; color: #333; }
  .sidebar .file-item {
    padding: 4px 6px; cursor: pointer; border-radius: 3px;
    margin: 1px 0; word-break: break-all;
  }
  .sidebar .file-item:hover { background: #d0d0ff; }
  .sidebar .file-item.active { background: #aaccff; font-weight: bold; }
  .sidebar .bookmark-item {
    padding: 3px 6px; cursor: pointer; border-radius: 3px;
    margin: 1px 0; font-size: 12px; color: #555;
  }
  .sidebar .bookmark-item:hover { background: #ddd; }
  .viewer-container {
    flex: 1; overflow: auto; position: relative;
    background: #808080;
  }
  #pdf-viewer { position: absolute; left: 50%; transform: translateX(-50%); }
  .page { margin: 8px auto; box-shadow: 0 2px 8px rgba(0,0,0,0.3); background: #fff; }
</style>
</head>
<body>
<div class="container">
  <div class="toolbar">
    <button id="btn-refresh">刷新</button>
    <span id="current-file" class="filename">未打开文件</span>
    <span class="spacer"></span>
    <button id="btn-prev" disabled>◀ 上一页</button>
    <input type="number" id="page-num" value="1" min="1" style="width:55px;">
    <span style="font-size:12px;">/ <span id="page-count">0</span></span>
    <button id="btn-next" disabled>下一页 ▶</button>
    <select id="zoom-select">
      <option value="0.5">50%</option>
      <option value="0.75">75%</option>
      <option value="1.0" selected>100%</option>
      <option value="1.25">125%</option>
      <option value="1.5">150%</option>
      <option value="2.0">200%</option>
    </select>
    <button id="btn-bookmark">书签</button>
  </div>
  <div class="main-area">
    <div class="sidebar">
      <h4>教材</h4>
      <div id="file-list"><span style="color:#888;">加载中...</span></div>
      <h4 style="margin-top:12px;">书签</h4>
      <div id="bookmark-list"><span style="color:#888;font-size:12px;">暂无书签</span></div>
      <h4 style="margin-top:12px;">阅读进度</h4>
      <div id="progress-info" style="font-size:12px;color:#666;"></div>
    </div>
    <div class="viewer-container" id="viewer-container">
      <div id="pdf-viewer"></div>
    </div>
  </div>
</div>

<script src="/pdfjs/pdf.min.mjs" type="module"></script>
<script src="/qwebchannel.js"></script>
<script type="module">
import * as pdfjsLib from "/pdfjs/pdf.min.mjs";

pdfjsLib.GlobalWorkerOptions.workerSrc = "/pdfjs/pdf.worker.min.mjs";

var pdfDoc = null;
var currentPage = 1;
var currentScale = 1.0;
var currentFile = null;
var currentFileName = null;
var bookmarks = [];
var bridge = null;

var container = document.getElementById("viewer-container");
var viewer = document.getElementById("pdf-viewer");

var btnRefresh = document.getElementById("btn-refresh");
var btnPrev = document.getElementById("btn-prev");
var btnNext = document.getElementById("btn-next");
var btnBookmark = document.getElementById("btn-bookmark");
var pageNumInput = document.getElementById("page-num");
var zoomSelect = document.getElementById("zoom-select");
var pageCount = document.getElementById("page-count");
var currentFileEl = document.getElementById("current-file");

btnRefresh.addEventListener("click", listBooks);
btnPrev.addEventListener("click", prevPage);
btnNext.addEventListener("click", nextPage);
btnBookmark.addEventListener("click", addBookmark);
pageNumInput.addEventListener("change", goToPage);
zoomSelect.addEventListener("change", setZoom);

async function loadPDF(url, filename) {
  try {
    pdfDoc = await pdfjsLib.getDocument(url).promise;
    currentFile = url;
    currentFileName = filename || url.split("/").pop();
    currentPage = 1;
    pageCount.textContent = pdfDoc.numPages;
    currentFileEl.textContent = currentFileName;
    pageNumInput.value = 1;
    btnPrev.disabled = true;
    btnNext.disabled = pdfDoc.numPages <= 1;
    await renderPage(currentPage);
    updateProgress();
    if (bridge) bridge.onFileOpened(currentFileName);
  } catch(e) {
    currentFileEl.textContent = "加载失败: " + e.message;
  }
}

async function renderPage(num) {
  if (!pdfDoc) return;
  var page = await pdfDoc.getPage(num);
  var viewport = page.getViewport({scale: currentScale});
  viewer.innerHTML = '';
  var canvas = document.createElement("canvas");
  canvas.className = "page";
  canvas.height = viewport.height;
  canvas.width = viewport.width;
  await page.render({canvasContext: canvas.getContext("2d"), viewport: viewport}).promise;
  viewer.appendChild(canvas);
  container.scrollTop = 0;
  pageNumInput.value = num;
  btnPrev.disabled = num <= 1;
  btnNext.disabled = num >= pdfDoc.numPages;
  updateProgress();
  if (bridge) bridge.onPageChanged(num, pdfDoc.numPages);
}

function prevPage() { if (currentPage > 1) { currentPage--; renderPage(currentPage); } }
function nextPage() { if (pdfDoc && currentPage < pdfDoc.numPages) { currentPage++; renderPage(currentPage); } }
function goToPage() {
  var num = parseInt(pageNumInput.value);
  if (pdfDoc && num >= 1 && num <= pdfDoc.numPages) { currentPage = num; renderPage(currentPage); }
}
function setZoom() {
  currentScale = parseFloat(zoomSelect.value);
  renderPage(currentPage);
}

function updateProgress() {
  if (!pdfDoc) return;
  document.getElementById("progress-info").textContent =
    "第 " + currentPage + " / " + pdfDoc.numPages + " 页";
}

async function listBooks() {
  try {
    var resp = await fetch("/books/");
    var text = await resp.text();
    var files = [];
    var div = document.createElement("div");
    div.innerHTML = text;
    var links = div.querySelectorAll("a");
    links.forEach(function(a) {
      var href = a.getAttribute("href");
      if (href && href.toLowerCase().endsWith(".pdf")) {
        files.push({name: decodeURIComponent(href), url: "/books/" + href});
      }
    });
    renderFileList(files);
  } catch(e) {
    document.getElementById("file-list").innerHTML =
      '<span style="color:#c00;">无法列出文件<br>将PDF放入 books/ 目录</span>';
  }
}

function renderFileList(files) {
  var fileList = document.getElementById("file-list");
  if (files.length === 0) {
    fileList.innerHTML = '<span style="color:#888;font-size:12px;">将PDF放入 books/ 目录</span>';
    return;
  }
  fileList.innerHTML = '';
  files.forEach(function(f) {
    var div = document.createElement("div");
    div.className = "file-item";
    div.textContent = f.name.replace(/\.pdf$/i, "");
    div.addEventListener("click", function() {
      loadPDF(f.url, f.name);
      document.querySelectorAll(".file-item").forEach(function(el) { el.classList.remove("active"); });
      div.classList.add("active");
    });
    fileList.appendChild(div);
  });
}

function addBookmark() {
  if (!pdfDoc || !currentFileName) return;
  var exists = bookmarks.some(function(b) { return b.file === currentFileName && b.page === currentPage; });
  if (!exists) {
    bookmarks.push({file: currentFileName, page: currentPage, time: new Date().toISOString()});
    renderBookmarks();
    if (bridge) bridge.onBookmarksChanged(JSON.stringify(bookmarks));
  }
}

function renderBookmarks() {
  var bmList = document.getElementById("bookmark-list");
  bmList.innerHTML = "";
  if (bookmarks.length === 0) {
    bmList.innerHTML = '<span style="color:#888;font-size:12px;">暂无书签</span>';
    return;
  }
  bookmarks.forEach(function(b) {
    var div = document.createElement("div");
    div.className = "bookmark-item";
    div.textContent = b.file.replace(/\.pdf$/i, "") + " p." + b.page;
    div.addEventListener("click", function() {
      loadPDF("/books/" + encodeURIComponent(b.file), b.file).then(function() {
        setTimeout(function() { currentPage = b.page; renderPage(b.page); }, 600);
      });
    });
    bmList.appendChild(div);
  });
}

// 右键菜单: 捕获选中文字并发送给 Python
document.addEventListener("contextmenu", function(e) {
  var sel = window.getSelection().toString().trim();
  if (sel && bridge && bridge.onContextMenu) {
    e.preventDefault();
    bridge.onContextMenu(sel, e.clientX, e.clientY);
  }
});

// QWebChannel
new QWebChannel(qt.webChannelTransport, function(channel) {
  bridge = channel.objects.bridge;
  bridge.loadPDF = loadPDF;
  bridge.goToPage = goToPage;
  bridge.getBookmarks = function() { return JSON.stringify(bookmarks); };
});

// Init
listBooks();
</script>
</body>
</html>
