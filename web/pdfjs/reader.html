<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #525659; }
  #viewer-container { height: 100%; overflow: auto; text-align: center; }
  #pdf-viewer { display: inline-block; padding: 16px 0; }
  .page { margin: 8px auto; box-shadow: 0 2px 8px rgba(0,0,0,0.3); background: #fff; display: block; }
  .error-overlay {
    display: none; position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%);
    background: #fff; padding: 24px 32px; border-radius: 8px; text-align: center;
    font-family: sans-serif; box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .error-overlay button { margin-top: 12px; padding: 6px 16px; cursor: pointer; }
</style>
</head>
<body>
<div id="viewer-container">
  <div id="pdf-viewer"></div>
</div>
<div id="error-overlay" class="error-overlay">
  <p id="error-msg"></p>
  <button id="error-btn">在系统查看器中打开</button>
</div>

<script src="/pdfjs/pdf.min.mjs" type="module"></script>
<script src="/qwebchannel.js"></script>
<script type="module">
import * as pdfjsLib from "/pdfjs/pdf.min.mjs";

pdfjsLib.GlobalWorkerOptions.workerSrc = "/pdfjs/pdf.worker.min.mjs";

var pdfDoc = null;
var currentPage = 1;
var currentScale = 1.0;
var currentFile = null;
var currentFileName = null;
var bridge = null;

var container = document.getElementById("viewer-container");
var viewer = document.getElementById("pdf-viewer");
var errorOverlay = document.getElementById("error-overlay");
var errorMsg = document.getElementById("error-msg");
var errorBtn = document.getElementById("error-btn");

errorBtn.addEventListener("click", function() {
  if (bridge && currentFile) bridge.onOpenExternal(currentFile);
});

async function loadPDF(url, filename) {
  errorOverlay.style.display = "none";
  try {
    pdfDoc = await pdfjsLib.getDocument(url).promise;
    currentFile = url;
    currentFileName = filename || url.split("/").pop();
    currentPage = 1;
    currentScale = 1.0;
    await renderPage(currentPage);
    if (bridge) bridge.onFileOpened(currentFileName, pdfDoc.numPages);
  } catch(e) {
    errorMsg.textContent = "加载失败: " + e.message;
    errorBtn.textContent = "在系统查看器中打开";
    errorOverlay.style.display = "block";
    if (bridge) bridge.onLoadFailed(currentFileName || "", e.message);
  }
}

async function renderPage(num) {
  if (!pdfDoc) return;
  var page = await pdfDoc.getPage(num);
  var viewport = page.getViewport({scale: currentScale});
  viewer.innerHTML = "";
  var canvas = document.createElement("canvas");
  canvas.className = "page";
  canvas.height = viewport.height;
  canvas.width = viewport.width;
  await page.render({canvasContext: canvas.getContext("2d"), viewport: viewport}).promise;
  viewer.appendChild(canvas);
  container.scrollTop = 0;
  if (bridge) bridge.onPageChanged(num, pdfDoc.numPages);
  currentPage = num;
}

function prevPage() { if (currentPage > 1) { currentPage--; renderPage(currentPage); } }
function nextPage() { if (pdfDoc && currentPage < pdfDoc.numPages) { currentPage++; renderPage(currentPage); } }
function goToPage(num) { if (pdfDoc && num >= 1 && num <= pdfDoc.numPages) { currentPage = num; renderPage(currentPage); } }

function setZoom(factor_or_mode) {
  if (factor_or_mode === "fit-width") {
    if (!pdfDoc) return;
    pdfDoc.getPage(currentPage).then(function(page) {
      var cw = container.clientWidth - 32;
      currentScale = cw / page.getViewport({scale: 1}).width;
      renderPage(currentPage);
    });
  } else if (factor_or_mode === "fit-page") {
    if (!pdfDoc) return;
    pdfDoc.getPage(currentPage).then(function(page) {
      var ch = container.clientHeight - 32;
      currentScale = ch / page.getViewport({scale: 1}).height;
      renderPage(currentPage);
    });
  } else {
    currentScale = parseFloat(factor_or_mode);
    renderPage(currentPage);
  }
}

function getSelectionText() {
  var sel = window.getSelection().toString().trim();
  return sel;
}

function selectAll() {
  window.getSelection().removeAllRanges();
  var range = document.createRange();
  range.selectNodeContents(viewer);
  window.getSelection().addRange(range);
}

function copySelection() {
  document.execCommand("copy");
  return window.getSelection().toString().trim();
}

function searchPDF(query) {
  // Simple highlight on current page via PDF.js text content
  if (!pdfDoc) return 0;
  pdfDoc.getPage(currentPage).then(function(page) {
    page.getTextContent().then(function(textContent) {
      var found = 0;
      textContent.items.forEach(function(item) {
        if (item.str.toLowerCase().indexOf(query.toLowerCase()) >= 0) found++;
      });
      if (bridge) bridge.onSearchResult(found, currentPage);
    });
  });
  return 0;
}

// QWebChannel setup
new QWebChannel(qt.webChannelTransport, function(channel) {
  bridge = channel.objects.bridge;
  if (bridge) {
    // Methods callable from Python
    bridge.loadPDF = loadPDF;
    bridge.prevPage = prevPage;
    bridge.nextPage = nextPage;
    bridge.goToPage = goToPage;
    bridge.setZoom = setZoom;
    bridge.getSelectionText = getSelectionText;
    bridge.copySelection = copySelection;
    bridge.selectAll = selectAll;
    bridge.searchPDF = searchPDF;
    bridge.getCurrentPage = function() { return currentPage; };
    bridge.getTotalPages = function() { return pdfDoc ? pdfDoc.numPages : 0; };
  }
});
</script>
</body>
</html>
